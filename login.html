<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - GDrive Upload</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;display:flex;justify-content:center;align-items:center}
.login-box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:40px;width:100%;max-width:380px;margin:20px}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,#4285f4,#34a853);border-radius:12px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px}
.logo-icon svg{width:28px;height:28px;fill:#fff}
.logo h1{font-size:20px;color:#f0f6fc;margin-bottom:4px}
.logo p{font-size:13px;color:#8b949e}
.fg{margin-bottom:20px}
label{display:block;font-size:13px;color:#8b949e;margin-bottom:6px}
input{width:100%;padding:10px 14px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:14px;outline:none;transition:border .2s}
input:focus{border-color:#58a6ff}
input::placeholder{color:#484f58}
.btn{width:100%;padding:10px;background:#238636;border:none;border-radius:6px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s}
.btn:hover{background:#2ea043}
.btn:disabled{opacity:.5;cursor:not-allowed}
.error{background:#2d1013;border:1px solid #da3633;color:#f85149;padding:8px 12px;border-radius:6px;font-size:13px;margin-bottom:16px;display:none}
</style>
</head>
<body>
<div class="login-box">
<div style="text-align:center;margin-bottom:16px;font-size:13px"><a href="/docs" style="color:#58a6ff;margin:0 8px">Docs</a> <a href="/ai" style="color:#58a6ff;margin:0 8px">AI Agent</a> <a href="/prompt" style="color:#58a6ff;margin:0 8px">Prompt</a></div><div class="logo">
<div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg></div>
<h1>GDrive Upload</h1>
<p>Sign in to continue</p>
</div>
<div class="error" id="error"></div>
<form id="loginForm">
<div class="fg">
<label>Username</label>
<input type="text" id="username" placeholder="Enter username" required autofocus>
</div>
<div class="fg">
<label>Password</label>
<input type="password" id="password" placeholder="Enter password" required>
</div>
<button type="submit" class="btn" id="btn">Sign in</button>
</form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit',async function(e){
e.preventDefault();
const err=document.getElementById('error');
const btn=document.getElementById('btn');
btn.disabled=true;btn.textContent='Signing in...';
err.style.display='none';
try{
const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('username').value,password:document.getElementById('password').value})});
const d=await r.json();
if(d.success){window.location.href='/';}
else{err.textContent=d.error||'Invalid credentials';err.style.display='block';}
}catch(e){err.textContent='Connection error';err.style.display='block';}
btn.disabled=false;btn.textContent='Sign in';
});
</script>
</body>
</html>
