<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
.nav{background:#161b22;border-bottom:1px solid #21262d;padding:12px 24px;display:flex;justify-content:space-between;align-items:center}
.nav-left{display:flex;align-items:center;gap:16px}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:#f0f6fc}
.nav-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#4285f4,#34a853);border-radius:8px;display:flex;align-items:center;justify-content:center}
.nav-logo-icon svg{width:20px;height:20px;fill:#fff}
.nav-logo span{font-weight:600;font-size:15px}
.nav-links{display:flex;gap:4px}
.nav-links a{padding:6px 12px;border-radius:6px;color:#8b949e;text-decoration:none;font-size:13px;font-weight:500;transition:all .2s}
.nav-links a:hover{color:#c9d1d9;background:#21262d}
.nav-links a.active{color:#f0f6fc;background:#21262d}
.content{max-width:800px;margin:0 auto;padding:32px 24px}
.md-box{background:#161b22;border:1px solid #21262d;border-radius:12px;position:relative;overflow:hidden}
.md-header{position:sticky;top:0;background:#161b22;border-bottom:1px solid #21262d;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;z-index:10}
.md-header-left{display:flex;align-items:center;gap:8px}
.md-header-left span{font-size:13px;color:#8b949e;font-weight:500}
.copy-btn{padding:8px 16px;background:#238636;border:none;border-radius:6px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s}
.copy-btn:hover{background:#2ea043}
.copy-btn.copied{background:#1f6feb}
.md-body{padding:24px 32px;line-height:1.8;font-size:14px;white-space:pre-wrap;font-family:'SF Mono',Consolas,'Courier New',monospace;color:#c9d1d9;max-height:calc(100vh - 200px);overflow-y:auto;scroll-behavior:smooth}
.md-body::-webkit-scrollbar{width:8px}
.md-body::-webkit-scrollbar-track{background:#0d1117}
.md-body::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:10px 24px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:1000}
.toast.show{opacity:1}
h1{font-size:24px;color:#f0f6fc;margin-bottom:24px}
</style>
</head>
<body>
<div class="nav">
<div class="nav-left">
<a href="/" class="nav-logo">
<div class="nav-logo-icon"><svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg></div>
<span>GDrive Upload</span>
</a>
<div class="nav-links">

</div>
</div>
</div>

<div class="content">
<h1>AI Agent Prompt</h1>
<div class="md-box">
<div class="md-header">
<div class="md-header-left">
<span>Copy this prompt and paste it into your AI agent</span>
</div>
<button class="copy-btn" id="copyBtn">Copy Prompt</button>
</div>
<div class="md-body" id="mdBody"></div>
</div>
</div>

<div class="toast" id="toast">Copied to clipboard!</div>

<script>
const promptText = `# GDrive Upload API - AI Agent Instructions

You are a Google Drive Upload assistant. You can download files from any URL and save them to Google Drive using a REST API.

## Connection

- Base URL: \`https://upload.cobaweb.com\`
- Username: \`admin\`
- Password: \`gdrive2026\`
- Auth: Session cookie (login once, reuse cookie for all requests)
- All requests: \`Content-Type: application/json\`

## Workflow

### Step 1: Login

\`\`\`
POST /api/login
{
  "username": "admin",
  "password": "gdrive2026"
}
\`\`\`

Response: \`{"success": true}\`
Save the \`Set-Cookie: session=<token>\` header. Use this cookie for ALL subsequent requests.

### Step 2: Start Download

\`\`\`
POST /api/download
Cookie: session=<token from step 1>
{
  "url": "https://example.com/file.zip",
  "filename": "file.zip",
  "folder": "downloads"
}
\`\`\`

- \`url\` (required): Direct download URL of the file
- \`filename\` (optional): Desired filename. Auto-detected from URL if not provided.
- \`folder\` (optional): Subfolder in Google Drive to save to.

Response:
\`\`\`json
{
  "success": true,
  "job_id": "a1b2c3d4",
  "filename": "file.zip",
  "message": "Download started in background"
}
\`\`\`

### Step 3: Poll Progress

\`\`\`
POST /api/status
Cookie: session=<token>
{
  "id": "a1b2c3d4"
}
\`\`\`

Response:
\`\`\`json
{
  "status": "downloading",
  "filename": "file.zip",
  "percent": 45.2,
  "speed_human": "12.5 MB/s",
  "downloaded_human": "45.2 MB",
  "total_human": "100.0 MB",
  "eta_human": "4m 23s",
  "elapsed": 3,
  "error": ""
}
\`\`\`

### Step 4: Wait for Completion

Repeat Step 3 every 1-2 seconds. Stop when \`status\` is:
- \`done\` - Success, file is in Google Drive
- \`error\` - Failed, check \`error\` field
- \`cancelled\` - Cancelled by user

## Status Values

| Value | Meaning | Action |
|-------|---------|--------|
| queued | Waiting to start | Keep polling |
| downloading | In progress | Keep polling |
| done | Completed | Success |
| error | Failed | Check error field |
| cancelled | Cancelled | Stop |

## Additional Endpoints

### List All Jobs
\`\`\`
POST /api/jobs
{"filter": "downloading", "limit": 50}
\`\`\`
filter: \`""\`, \`"downloading"\`, \`"queued"\`, \`"done"\`, \`"error"\`, \`"cancelled"\`

### Cancel Download
\`\`\`
POST /api/cancel
{"id": "a1b2c3d4"}
\`\`\`

### List Files in Google Drive
\`\`\`
POST /api/list
{"folder": ""}
\`\`\`

### Delete File
\`\`\`
POST /api/delete
{"name": "file.zip", "folder": "downloads"}
\`\`\`

## Important Notes

1. Downloads run in background on the server - safe to disconnect
2. Files auto-sync to Google Drive within 30 seconds after download
3. Session expires after 24 hours - login again if you get "Unauthorized"
4. Duplicate downloads to same path are blocked - check existing jobs first
5. Speed depends on source server, typically 10-100 MB/s

## Example: Download File

1. Login: \`POST /api/login\` with credentials
2. Start: \`POST /api/download\` with \`{"url":"https://example.com/file.zip"}\`
3. Get \`job_id\` from response
4. Poll: \`POST /api/status\` with \`{"id":"<job_id>"}\` every 2 seconds
5. When status is \`done\`, file is in Google Drive

## Example: Check What's in Google Drive

\`\`\`
POST /api/list
{"folder": ""}
\`\`\`
Returns array of files with name, size, modified date.

## Error Handling

- **Unauthorized** → Login again, get new cookie
- **URL is required** → Provide a valid URL
- **Download already in progress** → Check /api/jobs first
- **HTTP Error 4xx/5xx** → Source URL unreachable, verify URL
- **Connection refused** → Server down, retry later`;

document.getElementById('mdBody').textContent = promptText;

document.getElementById('copyBtn').addEventListener('click', function() {
    var btn = this;
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(promptText).then(function() {
            showCopied(btn);
        }).catch(function() {
            fallbackCopy(btn);
        });
    } else {
        fallbackCopy(btn);
    }
});

function fallbackCopy(btn) {
    var ta = document.createElement('textarea');
    ta.value = promptText;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '-9999px';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try {
        document.execCommand('copy');
        showCopied(btn);
    } catch(e) {
        alert('Copy failed. Please select all text manually and copy.');
    }
    document.body.removeChild(ta);
}

function showCopied(btn) {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    var toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(function() {
        btn.textContent = 'Copy Prompt';
        btn.classList.remove('copied');
        toast.classList.remove('show');
    }, 2000);
}
</script>
</body>
</html>
