<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDrive Upload</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
.nav{background:#161b22;border-bottom:1px solid #21262d;padding:12px 24px;display:flex;justify-content:space-between;align-items:center}
.nav-left{display:flex;align-items:center;gap:16px}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:#f0f6fc}
.nav-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#4285f4,#34a853);border-radius:8px;display:flex;align-items:center;justify-content:center}
.nav-logo-icon svg{width:20px;height:20px;fill:#fff}
.nav-logo span{font-weight:600;font-size:15px}
.nav-links{display:flex;gap:4px}
.nav-links a{padding:6px 12px;border-radius:6px;color:#8b949e;text-decoration:none;font-size:13px;font-weight:500;transition:all .2s}
.nav-links a:hover{color:#c9d1d9;background:#21262d}
.nav-links a.active{color:#f0f6fc;background:#21262d}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-user{font-size:13px;color:#8b949e}
.nav-logout{padding:6px 12px;border:1px solid #30363d;border-radius:6px;color:#8b949e;text-decoration:none;font-size:13px;transition:all .2s}
.nav-logout:hover{color:#f85149;border-color:#f85149}
.content{max-width:900px;margin:0 auto;padding:32px 24px}
.card{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:24px;margin-bottom:24px}
.card-title{font-size:16px;font-weight:600;color:#f0f6fc;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.card-title a{font-size:13px;color:#58a6ff;text-decoration:none;font-weight:500}
.card-title a:hover{text-decoration:underline}
.fg{margin-bottom:16px}
label{display:block;font-size:13px;color:#8b949e;margin-bottom:6px}
input[type="text"],input[type="url"]{width:100%;padding:10px 14px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:14px;outline:none;transition:border .2s}
input:focus{border-color:#58a6ff}
input::placeholder{color:#484f58}
.btn{padding:10px 24px;background:#238636;border:none;border-radius:6px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s}
.btn:hover{background:#2ea043}
.btn:disabled{opacity:.5;cursor:not-allowed}
.job{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:14px;margin-bottom:8px;transition:border .2s}
.job:hover{border-color:#30363d}
.job-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.job-name{font-weight:600;font-size:13px;color:#c9d1d9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%}
.job-badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.job-badge.queued{background:#1f2d3d;color:#58a6ff}
.job-badge.downloading{background:#1a2332;color:#58a6ff}
.job-badge.done{background:#0d2818;color:#3fb950}
.job-badge.error{background:#2d1013;color:#f85149}
.job-badge.cancelled{background:#2d1f0d;color:#d29922}
.job-bar{height:4px;background:#21262d;border-radius:2px;overflow:hidden;margin:8px 0}
.job-fill{height:100%;border-radius:2px;transition:width .3s}
.job-fill.downloading{background:linear-gradient(90deg,#238636,#3fb950)}
.job-fill.done{background:#3fb950}
.job-fill.error{background:#f85149}
.job-fill.cancelled{background:#d29922}
.job-meta{display:flex;justify-content:space-between;font-size:11px;color:#8b949e}
.job-cancel{background:none;border:1px solid #30363d;color:#8b949e;padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer;margin-left:8px;transition:all .2s}
.job-cancel:hover{border-color:#f85149;color:#f85149}
.empty{text-align:center;padding:24px;color:#484f58;font-size:13px}
.files-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid #21262d;font-size:13px}
.files-item:last-child{border-bottom:none}
.files-item .name{color:#c9d1d9;display:flex;align-items:center;gap:8px}
.files-item .meta{color:#8b949e;font-size:12px;display:flex;gap:12px;align-items:center}
.files-item .del{background:none;border:none;color:#484f58;cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px}
.files-item .del:hover{color:#f85149;background:#2d1013}
.dir-icon{color:#58a6ff}
</style>
</head>
<body>
<div class="nav">
<div class="nav-left">
<a href="/" class="nav-logo">
<div class="nav-logo-icon"><svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg></div>
<span>GDrive Upload</span>
</a>
<div class="nav-links">
<a href="/">Upload</a>
<a href="/status">Status</a>
<a href="/docs">Docs</a>
<a href="/ai">AI Agent</a>
<a href="/prompt">Prompt</a>
</div>
</div>
<div class="nav-right">
<span class="nav-user" id="user"></span>
<a href="/logout" class="nav-logout">Sign out</a>
</div>
</div>

<div class="content">
<div class="card">
<div class="card-title">New Download</div>
<form id="f">
<div class="fg"><label>File URL</label><input type="url" id="url" placeholder="https://example.com/file.zip" required></div>
<div style="display:flex;gap:12px">
<div class="fg" style="flex:1"><label>Filename <span style="color:#484f58">(optional)</span></label><input type="text" id="filename" placeholder="Auto-detect"></div>
<div class="fg" style="flex:1"><label>Folder <span style="color:#484f58">(optional)</span></label><input type="text" id="folder" placeholder="Subfolder"></div>
</div>
<button type="submit" class="btn" id="btn">Download to Google Drive</button>
</form>
</div>

<div class="card">
<div class="card-title">Active Downloads <a href="/status">View all</a></div>
<div id="activeJobs"><div class="empty">No active downloads</div></div>
</div>

<div class="card">
<div class="card-title">Files in Google Drive</div>
<div id="files"><div class="empty">Loading...</div></div>
</div>
</div>

<script>
const poll={active:null};
async function loadUser(){try{const r=await fetch('/api/me');const d=await r.json();if(d.user)document.getElementById('user').textContent=d.user;}catch(e){}}

document.getElementById('f').addEventListener('submit',async function(e){
e.preventDefault();
const btn=document.getElementById('btn');btn.disabled=true;btn.textContent='Starting...';
try{
const r=await fetch('/api/download',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:document.getElementById('url').value,filename:document.getElementById('filename').value,folder:document.getElementById('folder').value})});
const d=await r.json();
if(d.success){document.getElementById('url').value='';document.getElementById('filename').value='';document.getElementById('folder').value='';startPoll();}
else{alert(d.error||'Error');}
}catch(e){alert('Error: '+e.message);}
btn.disabled=false;btn.textContent='Download to Google Drive';
});

function startPoll(){
if(poll.active)return;
poll.active=true;pollActive();
}

async function pollActive(){
if(!poll.active)return;
try{
const r=await fetch('/api/jobs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({limit:3,filter:'downloading'})});
const r2=await fetch('/api/jobs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({limit:3,filter:'queued'})});
const active=await r.json();
const queued=await r2.json();
const all=[...queued,...active].slice(0,3);
renderActive(all);
const hasActive=all.some(j=>j.status==='downloading'||j.status==='queued');
if(hasActive)setTimeout(pollActive,1000);
else{poll.active=false;setTimeout(loadFiles,2000);}
}catch(e){setTimeout(pollActive,3000);}
}

function renderActive(jobs){
const el=document.getElementById('activeJobs');
if(!jobs.length){el.innerHTML='<div class="empty">No active downloads</div>';return;}
el.innerHTML=jobs.map(j=>{
const pct=j.percent||0;
const s=j.status;
const isActive=s==='downloading'||s==='queued';
const bar=s==='done'?'100':isActive?pct:'0';
const info=isActive&&j.total_human!=='0 B'?`${j.downloaded_human} / ${j.total_human} \u00b7 ${j.speed_human} \u00b7 ETA ${j.eta_human}`:s==='done'?`${j.size_human} \u00b7 ${j.speed_human} \u00b7 ${j.elapsed}s`:s==='error'?j.error:'';
return `<div class="job"><div class="job-top"><span class="job-name">${j.filename}</span><span><span class="job-badge ${s}">${s}</span>${isActive?`<button class="job-cancel" onclick="cancelJob('${j.id}')">Cancel</button>`:''}</span></div><div class="job-bar"><div class="job-fill ${s}" style="width:${bar}%"></div></div><div class="job-meta"><span>${info}</span><span>${pct}%</span></div></div>`;
}).join('');
}

async function cancelJob(id){await fetch('/api/cancel',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});pollActive();}

async function deleteFile(name,folder){
if(!confirm('Delete '+name+'?'))return;
await fetch('/api/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,folder})});
loadFiles();
}

async function loadFiles(){
try{
const r=await fetch('/api/list',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({folder:''})});
const f=await r.json();
const el=document.getElementById('files');
if(!f.length){el.innerHTML='<div class="empty">No files yet</div>';return;}
el.innerHTML=f.map(i=>`<div class="files-item"><span class="name">${i.is_dir?'<span class="dir-icon">\ud83d\udcc1</span>':'\ud83d\udcc4'} ${i.name}</span><span class="meta"><span>${i.size_human}</span><span>${i.modified}</span><button class="del" onclick="deleteFile('${i.name.replace(/'/g,"\\'")}','')" title="Delete">\u2715</button></span></div>`).join('');
}catch(e){document.getElementById('files').innerHTML='<div class="empty">Error loading files</div>';}
}

loadUser();loadFiles();startPoll();
</script>
</body>
</html>
